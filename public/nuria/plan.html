<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0c1017" />
  <title>Plan de entrenamiento</title>
  <style>
    :root {
      --bg: #0c1017;
      --surface: #161d27;
      --surface2: #1c2535;
      --border: #232f40;
      --text: #eaf0f6;
      --text2: #c4d0de;
      --muted: #6b7f96;
      --gym: #4e94ff;
      --gym-bg: rgba(78,148,255,.10);
      --gym-bg2: rgba(78,148,255,.18);
      --walk: #34d9a8;
      --walk-bg: rgba(52,217,168,.10);
      --walk-bg2: rgba(52,217,168,.18);
      --easy: #a78bfa;
      --easy-bg: rgba(167,139,250,.10);
      --easy-bg2: rgba(167,139,250,.18);
      --today: #ff9f43;
      --r: 16px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
      padding-bottom: var(--safe-b);
    }

    /* ── HEADER ── */
    .app-header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(12,16,23,.82);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
    }
    .app-header h1 {
      font-size: 1.15rem; font-weight: 700; letter-spacing: -.01em;
    }
    .app-header .sub {
      font-size: .78rem; color: var(--muted); margin-top: 8px;
    }

    .header-tabs {
      display: flex;
      gap: 0;
      margin-top: 12px;
      padding: 3px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .header-tab {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 600;
      padding: 9px 12px;
      border-radius: 9px;
      cursor: pointer;
      transition: background .15s, color .15s;
      font-family: inherit;
    }
    .header-tab.active {
      background: var(--text);
      color: var(--bg);
    }

    .panel[hidden] {
      display: none !important;
    }

    /* ── Comidas: acordeón + propuestas ── */
    .meals-content {
      padding-top: 10px;
      padding-bottom: 28px;
    }

    .meal-acc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .meal-acc-head {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .meal-acc-head:active { opacity: 0.92; }
    .meal-acc-head .meal-count {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 8px;
    }
    .meal-acc .acc-chevron {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: var(--muted);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .meal-acc.open .acc-chevron {
      transform: rotate(180deg);
    }

    .meal-acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .meal-acc.open .meal-acc-body {
      max-height: 12000px;
    }
    .meal-acc-inner {
      padding: 0 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meal-prop {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .meal-prop-visual {
      position: relative;
      aspect-ratio: 16 / 10;
      background: linear-gradient(145deg, var(--surface2), #0e131a);
    }
    .meal-prop-visual img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .meal-prop-ph {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 16px;
      text-align: center;
      line-height: 1.35;
    }
    .meal-prop-cap {
      padding: 12px 14px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .meal-text-block {
      padding: 12px 14px 14px;
    }
    .meal-match {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(52, 217, 168, 0.08);
      border: 1px solid rgba(52, 217, 168, 0.22);
      margin-bottom: 10px;
    }
    .meal-match .tag {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--walk);
    }
    .meal-match p {
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      margin: 0;
    }

    .meal-alts-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .meal-alts {
      margin: 0;
      padding-left: 1.1rem;
      font-size: 0.8rem;
      color: var(--text2);
      line-height: 1.5;
    }
    .meal-alts li {
      margin-bottom: 6px;
    }
    .meal-alts li:last-child {
      margin-bottom: 0;
    }

    .meal-prop.no-image-yet .meal-match {
      background: rgba(78, 148, 255, 0.08);
      border-color: rgba(78, 148, 255, 0.2);
    }
    .meal-prop.no-image-yet .meal-match .tag {
      color: var(--gym);
    }

    /* ── WEEK NAV (horizontal scroll) ── */
    .week-nav {
      display: flex; gap: 6px; overflow-x: auto; scroll-snap-type: x mandatory;
      padding: 14px 20px 10px; -ms-overflow-style: none; scrollbar-width: none;
    }
    .week-nav::-webkit-scrollbar { display: none; }

    .week-btn {
      flex: 0 0 auto; scroll-snap-align: start;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: .72rem; font-weight: 600;
      padding: 7px 14px; border-radius: 20px; cursor: pointer;
      transition: all .2s; white-space: nowrap;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .week-btn.active {
      background: var(--text); color: var(--bg); border-color: var(--text);
    }

    /* ── MAIN CONTENT ── */
    .content { padding: 6px 16px 32px; max-width: 520px; margin: 0 auto; }

    /* ── DAY CARD ── */
    .day {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color .25s, box-shadow .25s;
      cursor: pointer;
      -webkit-user-select: none; user-select: none;
    }
    .day:active { transform: scale(.985); }
    .day.open { border-color: var(--accent-color); box-shadow: 0 0 0 1px var(--accent-color); }

    .day.gym    { --accent-color: var(--gym);  --accent-bg: var(--gym-bg);  --accent-bg2: var(--gym-bg2); }
    .day.walk   { --accent-color: var(--walk); --accent-bg: var(--walk-bg); --accent-bg2: var(--walk-bg2); }
    .day.easy   { --accent-color: var(--easy); --accent-bg: var(--easy-bg); --accent-bg2: var(--easy-bg2); }

    .day-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
    }

    .day-num {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--accent-bg);
      flex-shrink: 0;
    }
    .day-num .n { font-size: 1.15rem; font-weight: 700; line-height: 1; color: var(--accent-color); }
    .day-num .d { font-size: .55rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--accent-color); opacity: .75; margin-top: 2px; }

    .day.is-today .day-num {
      background: var(--today); 
    }
    .day.is-today .day-num .n,
    .day.is-today .day-num .d { color: #000; opacity: 1; }

    .day.is-today:not(.open) {
      box-shadow: 0 0 0 2px rgba(255, 159, 67, 0.55);
    }

    .day.is-today.open {
      box-shadow: 0 0 0 2px rgba(255, 159, 67, 0.35);
    }

    .badge.badge-today {
      background: rgba(255, 159, 67, 0.22) !important;
      color: var(--today) !important;
    }

    .day-info { flex: 1; min-width: 0; }
    .day-title {
      font-size: .88rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .day-subtitle {
      font-size: .74rem; color: var(--muted); margin-top: 1px;
      display: flex; align-items: center; gap: 6px;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em; padding: 2px 8px; border-radius: 6px;
      background: var(--accent-bg2); color: var(--accent-color);
    }

    .chevron {
      width: 20px; height: 20px; flex-shrink: 0;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      color: var(--muted);
    }
    .day.open .chevron { transform: rotate(180deg); }

    /* ── Pre-plan (antes del miércoles 6) ── */
    .day.pending {
      background: #11161d;
      border-color: #1a2330;
      opacity: 0.92;
      cursor: default;
    }
    .day.pending:active { transform: none; }
    .day.pending .day-num {
      background: rgba(107,127,150,.12);
    }
    .day.pending .day-num .n,
    .day.pending .day-num .d { color: var(--muted); opacity: 0.9; }
    .day.pending .day-title { color: #5d6f84; font-weight: 500; }
    .day.pending .day-subtitle { color: #4a5c72; }
    .day.pending .badge {
      background: rgba(107,127,150,.15); color: #6b7f96;
    }
    .day.pending .chevron { display: none; }
    .day.pending.is-today {
      box-shadow: 0 0 0 2px rgba(255, 159, 67, 0.45);
    }
    .day.pending.is-today .day-num {
      background: var(--today);
    }
    .day.pending.is-today .day-num .n,
    .day.pending.is-today .day-num .d {
      color: #000;
      opacity: 1;
    }

    /* ── DETAIL PANEL ── */
    .detail {
      max-height: 0; overflow: hidden;
      transition: max-height .35s cubic-bezier(.4,0,.2,1);
    }
    .day.open .detail { max-height: 320px; }

    .detail-inner {
      padding: 0 16px 16px;
    }
    .detail-inner .divider {
      height: 1px; background: var(--border); margin-bottom: 14px;
    }

    .detail-blocks { display: flex; flex-direction: column; gap: 10px; }

    .d-block {
      background: var(--accent-bg);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .d-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--accent-bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; flex-shrink: 0;
    }
    .d-text { flex: 1; }
    .d-text .label { font-size: .68rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .04em; font-weight: 600; }
    .d-text .value { font-size: .9rem; font-weight: 600; color: var(--text); margin-top: 1px; }

    .d-minutes {
      font-size: 1.1rem; font-weight: 700; color: var(--accent-color);
      white-space: nowrap;
    }

    .pace-note {
      font-size: .75rem; color: var(--muted); text-align: center;
      margin-top: 4px; padding: 0 4px;
    }

    /* ── LEGEND (bottom) ── */
    .legend {
      display: flex; justify-content: center; gap: 16px;
      padding: 10px 20px 20px; flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: .72rem; color: var(--muted); font-weight: 500;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 3px;
    }

    @media (min-width: 600px) {
      .content { padding: 10px 24px 40px; }
      .day-row { padding: 16px 20px; }
      .detail-inner { padding: 0 20px 20px; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <h1>Mayo 2026</h1>
  <div class="header-tabs" role="tablist" aria-label="Sección">
    <button type="button" class="header-tab" role="tab" id="tab-comidas" data-section="comidas" aria-selected="false" aria-controls="panelComidas">Comidas</button>
    <button type="button" class="header-tab active" role="tab" id="tab-ejercicios" data-section="ejercicios" aria-selected="true" aria-controls="panelEjercicios">Ejercicios</button>
  </div>
  <div class="sub" id="headerSub">17 sesiones · entrenamiento</div>
</div>

<section id="panelComidas" class="panel" role="tabpanel" aria-labelledby="tab-comidas" hidden>
  <div class="content meals-content" id="mealsRoot"></div>
</section>

<section id="panelEjercicios" class="panel" role="tabpanel" aria-labelledby="tab-ejercicios">
<nav class="week-nav" id="weekNav"></nav>

<div class="content" id="content"></div>

<div class="legend">
  <span class="legend-item"><span class="legend-dot" style="background:var(--gym)"></span> Gimnasio</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--walk)"></span> Caminata rápida</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--easy)"></span> Caminata suave</span>
</div>
</section>

<script>
(function () {
  const DATA = [
    { day:6,  dow:"Miércoles", kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
    { day:7,  dow:"Jueves",    kind:"walk", label:"Caminata rápida", mins:55, parts:[{icon:"🚶",name:"Caminata rápida",mins:55}], pace:"10–11 min/km" },
    { day:8,  dow:"Viernes",   kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
    { day:9,  dow:"Sábado",    kind:"walk", label:"Caminata rápida", mins:60, parts:[{icon:"🚶",name:"Caminata rápida",mins:60}], pace:"10–11 min/km" },
    { day:10, dow:"Domingo",   kind:"easy", label:"Caminata suave",  mins:35, parts:[{icon:"🌿",name:"Caminata suave",mins:35}] },
    { day:11, dow:"Lunes",     kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
    { day:12, dow:"Martes",    kind:"walk", label:"Caminata rápida", mins:55, parts:[{icon:"🚶",name:"Caminata rápida",mins:55}], pace:"10–11 min/km" },
    { day:13, dow:"Miércoles", kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
    { day:14, dow:"Jueves",    kind:"walk", label:"Caminata rápida", mins:55, parts:[{icon:"🚶",name:"Caminata rápida",mins:55}], pace:"10–11 min/km" },
    { day:15, dow:"Viernes",   kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
    { day:16, dow:"Sábado",    kind:"walk", label:"Caminata rápida", mins:60, parts:[{icon:"🚶",name:"Caminata rápida",mins:60}], pace:"10–11 min/km" },
    { day:17, dow:"Domingo",   kind:"easy", label:"Caminata suave",  mins:35, parts:[{icon:"🌿",name:"Caminata suave",mins:35}] },
    { day:18, dow:"Lunes",     kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
    { day:19, dow:"Martes",    kind:"walk", label:"Caminata rápida", mins:55, parts:[{icon:"🚶",name:"Caminata rápida",mins:55}], pace:"10–11 min/km" },
    { day:20, dow:"Miércoles", kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
    { day:21, dow:"Jueves",    kind:"walk", label:"Caminata rápida", mins:55, parts:[{icon:"🚶",name:"Caminata rápida",mins:55}], pace:"10–11 min/km" },
    { day:22, dow:"Viernes",   kind:"gym",  label:"Gimnasio",       mins:45, parts:[{icon:"🏋️",name:"Elíptica",mins:20},{icon:"🏃",name:"Cinta",mins:25,note:"inclinación o correr"}] },
  ];

  const PLAN_FIRST_DAY = 6;
  const dowEs = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];

  const PLAN_YEAR = 2026;
  const PLAN_MONTH = 4;

  const WEEKS = [
    { id: "s1", label: "Sem 1 · 4–10 may", days: [4,5,6,7,8,9,10] },
    { id: "s2", label: "Sem 2 · 11–17 may", days: [11,12,13,14,15,16,17] },
    { id: "s3", label: "Sem 3 · 18–22 may", days: [18,19,20,21,22] },
  ];

  const now = new Date();
  const inPlanMonth =
    now.getFullYear() === PLAN_YEAR && now.getMonth() === PLAN_MONTH;
  const todayDay = inPlanMonth ? now.getDate() : -1;

  const chevronSVG = `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

  function buildPendingCard(dayNum) {
    const d = new Date(2026, 4, dayNum);
    const dow = dowEs[d.getDay()];
    const capDow = dow.charAt(0).toUpperCase() + dow.slice(1);
    const isToday = dayNum === todayDay;
    const card = document.createElement("div");
    card.className = `day pending${isToday ? " is-today" : ""}`;
    card.dataset.day = String(dayNum);
    if (isToday) card.setAttribute("aria-current", "date");
    card.innerHTML = `
      <div class="day-row">
        <div class="day-num">
          <span class="n">${dayNum}</span>
          <span class="d">${capDow.slice(0,3)}</span>
        </div>
        <div class="day-info">
          <div class="day-title">Aún no empieza el plan</div>
          <div class="day-subtitle">
            <span>Primera sesión: mié. 6 may</span>${isToday ? `<span class="badge badge-today">Hoy</span>` : ""}
          </div>
        </div>
      </div>
    `;
    return card;
  }

  function buildCard(e) {
    const isToday = e.day === todayDay;
    const card = document.createElement("div");
    card.className = `day ${e.kind}${isToday ? " is-today" : ""}`;
    card.dataset.day = e.day;
    if (isToday) card.setAttribute("aria-current", "date");

    const blocksHTML = e.parts.map(p => `
      <div class="d-block">
        <div class="d-icon">${p.icon}</div>
        <div class="d-text">
          <div class="label">${p.name}</div>
          ${p.note ? `<div class="value">${p.note}</div>` : ""}
        </div>
        <div class="d-minutes">${p.mins} min</div>
      </div>
    `).join("");

    const paceHTML = e.pace ? `<div class="pace-note">Ritmo objetivo: ${e.pace}</div>` : "";

    const todayBadge = isToday ? `<span class="badge badge-today">Hoy</span>` : "";

    card.innerHTML = `
      <div class="day-row">
        <div class="day-num">
          <span class="n">${e.day}</span>
          <span class="d">${e.dow.slice(0,3)}</span>
        </div>
        <div class="day-info">
          <div class="day-title">${e.label}</div>
          <div class="day-subtitle">
            <span>${e.mins} min</span>
            <span class="badge">${e.kind === "gym" ? "gym" : e.kind === "walk" ? "outdoor" : "relax"}</span>
            ${todayBadge}
          </div>
        </div>
        ${chevronSVG}
      </div>
      <div class="detail">
        <div class="detail-inner">
          <div class="divider"></div>
          <div class="detail-blocks">${blocksHTML}</div>
          ${paceHTML}
        </div>
      </div>
    `;

    card.addEventListener("click", () => {
      const wasOpen = card.classList.contains("open");
      document.querySelectorAll(".day.open").forEach(c => c.classList.remove("open"));
      if (!wasOpen) card.classList.add("open");
    });

    return card;
  }

  const nav = document.getElementById("weekNav");
  const content = document.getElementById("content");
  let activeWeek = null;

  function getDefaultWeek() {
    const y = now.getFullYear();
    const m = now.getMonth();
    const d = now.getDate();

    if (inPlanMonth) {
      if (d >= 4 && d <= 10) return "s1";
      if (d >= 11 && d <= 17) return "s2";
      if (d >= 18 && d <= 22) return "s3";
      if (d < 4) return "s1";
      return "s3";
    }
    if (y < PLAN_YEAR || (y === PLAN_YEAR && m < PLAN_MONTH)) return "s1";
    if (y > PLAN_YEAR || (y === PLAN_YEAR && m > PLAN_MONTH)) return "s3";
    return "s1";
  }

  function scrollActiveWeekTabIntoView() {
    const active = nav.querySelector(".week-btn.active");
    if (active) {
      active.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }
  }

  function showWeek(weekId) {
    activeWeek = weekId;
    nav.querySelectorAll(".week-btn").forEach(b => b.classList.toggle("active", b.dataset.week === weekId));
    const week = WEEKS.find(w => w.id === weekId);
    content.innerHTML = "";
    week.days.forEach(d => {
      if (d < PLAN_FIRST_DAY) {
        content.appendChild(buildPendingCard(d));
        return;
      }
      const entry = DATA.find(e => e.day === d);
      if (entry) content.appendChild(buildCard(entry));
    });
    scrollToToday(false);
  }

  WEEKS.forEach(w => {
    const btn = document.createElement("button");
    btn.className = "week-btn";
    btn.textContent = w.label;
    btn.dataset.week = w.id;
    btn.addEventListener("click", () => {
      showWeek(w.id);
      requestAnimationFrame(() =>
        btn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" })
      );
    });
    nav.appendChild(btn);
  });

  showWeek(getDefaultWeek());
  requestAnimationFrame(() => {
    scrollActiveWeekTabIntoView();
    scrollToToday(false);
  });

  function scrollToToday(smooth) {
    const el = content.querySelector(".is-today");
    if (el) el.scrollIntoView({ behavior: smooth ? "smooth" : "auto", block: "center" });
  }

  const panelComidas = document.getElementById("panelComidas");
  const panelEjercicios = document.getElementById("panelEjercicios");
  const headerSub = document.getElementById("headerSub");
  const headerTabs = document.querySelector(".header-tabs");

  function setSection(section) {
    const isEjercicios = section === "ejercicios";
    panelEjercicios.hidden = !isEjercicios;
    panelComidas.hidden = isEjercicios;
    headerTabs.querySelectorAll(".header-tab").forEach((btn) => {
      const on = btn.dataset.section === section;
      btn.classList.toggle("active", on);
      btn.setAttribute("aria-selected", on ? "true" : "false");
    });
    headerSub.textContent = isEjercicios
      ? "17 sesiones · entrenamiento"
      : "Comidas e ideas para mayo";
  }

  headerTabs.addEventListener("click", (e) => {
    const btn = e.target.closest(".header-tab");
    if (!btn) return;
    setSection(btn.dataset.section);
  });
})();
</script>
